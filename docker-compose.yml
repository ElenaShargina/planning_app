version: '3.8'

services:

  nginx:
    image: nginx:alpine
    container_name: planning_app_nginx
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (if you add SSL later)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/staticfiles
      - media_volume:/mediafiles
    depends_on:
      - web
    restart: always
    networks:
      - planning_network

  web:
    build: .
    container_name: planning_app_web
    command: gunicorn planning_app.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=planning_app.settings
    expose:
      - "8000"  # Only expose to nginx, not to outside
    restart: always
    networks:
      - planning_network

volumes:
  static_volume:
  media_volume:
  # postgres_data:

networks:
  planning_network:
    driver: bridge