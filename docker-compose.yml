version: '3.8'

services:
  web:
    build: .
    command: gunicorn planning_app.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=planning_app.settings
    restart: always

volumes:
  static_volume: