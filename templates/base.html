<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Planner{% endblock %}</title>
    <style>
        :root {
            --primary: #4c4195;
            --bg-light: #fffeff;
            --text-dark: #000000;
            --border-color: #ffffffe0;
        }

        html { font-size: 16px; }
        body { 
            font-family: 'Times New Roman', Times, Georgia, serif;
            margin: 0; 
            background: var(--bg-light); 
            color: var(--text-dark); 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- ВЕРХНЯЯ СТРОКА --- */
        .top-header {
            background: rgb(255, 255, 255);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; /* Используем flex для выравнивания кругов и текста */
            align-items: center;
            justify-content: center; /* Центрируем заголовок */
            position: relative; /* Чтобы позиционировать круги абсолютно или относительно */
            box-shadow: 0 2px 4px rgba(255,250,250);
            z-index: 10;
            height: 80px; /* Фиксируем высоту для аккуратности */
        }

        /* Контейнер для кругов слева */
        .window-controls {
            position: absolute;
            left: 20px;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background-color: #9370DB; }
        .dot-yellow { background-color: #6A5ACD; }
        .dot-green { background-color: #483D8B; }

        .app-title {
            margin: 0;
            font-size: 3rem; 
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            text-align: center;
        }

        /* --- ОСНОВНОЙ ЛЕЙАУТ --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- ЛЕВАЯ КОЛОНКА --- */
        .sidebar {
            width: 280px; /* Чуть шире для крупного текста */
            background: rgb(255, 255, 255);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
        }
        .nav-item {
            display: block;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 500;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background: #f1edffa1;
            color: var(--primary);
            transform: translateX(5px);
        }
        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        /* --- ПРАВАЯ ЧАСТЬ --- */
        .content-area {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
        }

        /* --- ПРОФИЛЬ --- */
        .user-profile {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            font-size: 1.1rem;
        }
        .btn-logout { 
            font-size: 1rem; 
            color: #5435dc; 
            text-decoration: none; 
            border-left: 1px solid #eee;
            padding-left: 15px;
            margin-left: 5px;
        }

        /* --- ОБЩИЕ ЭЛЕМЕНТЫ --- */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(160, 25, 25, 0.05);
            border: 1px solid var(--border-color);
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
        }
        .btn:hover { background: #0d0d25; }
        
        input, textarea, select {
            width: 100%; padding: 12px; margin: 8px 0 20px;
            border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box;
            font-size: 1.1rem;
            font-family: inherit;
        }

        .flip-card {
            background: transparent;
            width: 100%;
            max-width: 400px;
            height: 220px;
            perspective: 1000px;
            cursor: pointer;
            margin: 15px auto;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .flip-card-front {
            background: #fff;
            color: #333;
        }

        .flip-card-back {
            background: linear-gradient(135deg, #0d6efd, #3e0bd7);
            color: #fff;
            transform: rotateY(180deg);
        }

        .card-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .card-content {
            font-size: 1.2em;
            font-weight: 500;
            line-height: 1.4;
        }

        .flip-hint {
            position: absolute;
            bottom: 10px;
            font-size: 0.7em;
            opacity: 0.5;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .timer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            color: white;
        }

        .bg-running {
            background: #198754;
            animation: pulse 2s infinite;
        }

        .bg-stopped {
            background: #6c757d;
        }

        .timer-time {
            font-family: 'Courier New', monospace;
            font-size: 1.8em;
            font-weight: bold;
            color: #212529;
            margin: 5px 0;
            letter-spacing: 1px;
        }

        .timer-stopped {
            opacity: 0.75;
        }

        .timer-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            margin: 0;
        }

        .timer-time { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="window-controls">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
        </div>

        <h1 class="app-title">Твой личный помощник</h1>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <a href="{% url 'plan_list' %}" class="nav-item {% if request.resolver_match.url_name == 'plan_list' or request.resolver_match.url_name == 'plan_detail' %}active{% endif %}">
                Планы
            </a>
            <a href="{% url 'collection_list' %}" class="nav-item {% if 'collection' in request.resolver_match.url_name %}active{% endif %}">
                Карточки
            </a>
            <a href="{% url 'timer_list' %}" class="nav-item {% if 'timer' in request.resolver_match.url_name %}active{% endif %}">
                Таймер
            </a>
            <a href="{% url 'reports_list' %}" class="nav-item {% if 'report' in request.resolver_match.url_name %}active{% endif %}">
                Отчеты
            </a>
            <a href="{% url 'bookmark_list' %}" class="nav-item {% if 'bookmark' in request.resolver_match.url_name %}active{% endif %}">
                Закладки
            </a>
        </aside>

        <main class="content-area">
            <div class="user-profile">
                {% if user.is_authenticated %}
                    <span class="user-name">{{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn-logout">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm">Войти</a>
                {% endif %}
            </div>

            <div style="margin-top: 60px;">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

</body>
</html>
