{% extends 'base.html' %}
{% block content %}
    <h3>Create Plan</h3>
    <form method="post" style="background:white; padding:20px; border-radius:8px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save Plan</button>
    </form>
    <br><a href="{% url 'plan_list' %}" class="btn btn-outline">Cancel</a>
{% endblock %}
